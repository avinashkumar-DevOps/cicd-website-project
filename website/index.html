<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevStream - Video Platform</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#141414;
    color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:black;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:red;
}

.menu a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

/* Banner */

.banner{
    height:400px;
    background:url("https://images.unsplash.com/photo-1522199710521-72d69614c702") center/cover;
    display:flex;
    align-items:center;
    padding-left:50px;
}

.banner h1{
    font-size:48px;
}

/* Video Section */

.section{
    padding:30px 40px;
}

.section h2{
    margin-bottom:20px;
}

/* Video Grid */

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.video-card{
    background:#1f1f1f;
    border-radius:8px;
    overflow:hidden;
    transition:0.3s;
}

.video-card:hover{
    transform:scale(1.05);
}

.video-card img{
    width:100%;
}

.video-info{
    padding:10px;
}

.video-title{
    font-size:16px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    background:black;
    margin-top:30px;
}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

<div class="logo">DevStream</div>

</div>

</div>
